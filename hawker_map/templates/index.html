<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singapore Hawker Centre Map</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Singapore Hawker Centre Map</h1>
            <p class="subtitle">Search and explore hawker centres in Singapore</p>

            <label for="searchInput">Search by hawker centre name</label>
            <input
                type="text"
                id="searchInput"
                placeholder="Type a hawker centre name"
            >

            <label for="statusFilter">Filter by status</label>
            <select id="statusFilter">
                <option value="all">All Statuses</option>
            </select>

            <label for="regionFilter">Filter by region</label>
            <select id="regionFilter">
                <option value="all">All Regions</option>
                <option value="North">North</option>
                <option value="South">South</option>
                <option value="East">East</option>
                <option value="West">West</option>
                <option value="Central">Central</option>
            </select>

            <p id="resultCount">Showing 0 hawker centres</p>

            <div id="hawkerList"></div>
        </div>

        <div id="map"></div>
    </div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
